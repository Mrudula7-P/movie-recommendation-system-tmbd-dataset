<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineMatch — Movie Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0d0d0d;
      --surface: #141414;
      --card:    #1c1c1c;
      --border:  #2a2a2a;
      --gold:    #c9a84c;
      --gold-dim:#7a5f24;
      --white:   #f0ede8;
      --muted:   #888;
      --red:     #c0392b;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--gold);
      border-radius: 4px;
      display: grid; place-items: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--black);
      font-weight: 900;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      color: var(--white);
    }
    .logo-text span { color: var(--gold); }

    /* ── HERO ── */
    .hero {
      padding: 5rem 2rem 3rem;
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
    }
    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 1.25rem;
    }
    h1 em {
      font-style: italic;
      color: var(--gold);
    }
    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 2.5rem;
    }

    /* ── SEARCH ── */
    .search-wrap {
      display: flex;
      gap: 0.5rem;
      max-width: 540px;
      margin: 0 auto;
    }
    input[type="text"] {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.85rem 1.1rem;
      font-size: 1rem;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--gold); }

    button {
      background: var(--gold);
      color: var(--black);
      border: none;
      border-radius: 6px;
      padding: 0.85rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    /* ── SUGGESTIONS DROPDOWN ── */
    .suggestions {
      max-width: 540px;
      margin: 0.25rem auto 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: none;
    }
    .suggestions.open { display: block; }
    .suggestion-item {
      padding: 0.65rem 1.1rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--white);
      transition: background 0.15s;
    }
    .suggestion-item:hover { background: var(--border); }

    /* ── ERROR ── */
    .error-msg {
      max-width: 540px;
      margin: 0.75rem auto 0;
      color: #e57373;
      font-size: 0.875rem;
      text-align: left;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── RESULTS ── */
    .results-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
      display: none;
    }
    .results-section.show { display: block; }

    .results-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .results-label strong { color: var(--gold); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-3px);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }

    .card-rank {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--border);
      line-height: 1;
      margin-bottom: 0.75rem;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    .card-sub {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .card-accent {
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover .card-accent { opacity: 1; }

    /* ── LOADING DOTS ── */
    .loading { display: none; text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
    .loading.show { display: block; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin: 0 3px; animation: bounce 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

    /* ── POPULAR PICKS ── */
    .popular {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }
    .popular-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .pill {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      color: var(--white);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .pill:hover { border-color: var(--gold); color: var(--gold); }

    /* ── DIVIDER ── */
    .divider {
      max-width: 860px;
      margin: 0 auto 2.5rem;
      padding: 0 2rem;
      border: none;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .search-wrap { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">C</div>
  <div class="logo-text">Cine<span>Match</span></div>
</header>

<section class="hero">
  <p class="eyebrow">Content-Based · TMDB 5000</p>
  <h1>Find your next <em>favourite</em> film</h1>
  <p class="subtitle">Type any movie title and we'll surface five films that share its soul — same genres, themes, cast, and director DNA.</p>

  <div class="search-wrap">
    <input type="text" id="movieInput" placeholder="e.g. The Dark Knight Rises" autocomplete="off"/>
    <button id="searchBtn" onclick="handleSearch()">Recommend</button>
  </div>
  <div class="suggestions" id="suggestions"></div>
  <div class="error-msg" id="errorMsg">Movie not found. Try a different title.</div>
</section>

<div class="loading" id="loading">
  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>

<section class="results-section" id="results">
  <p class="results-label" id="resultsLabel">Because you liked <strong id="queryTitle"></strong></p>
  <div class="cards" id="cardsGrid"></div>
</section>

<hr class="divider"/>

<section class="popular">
  <p class="popular-label">Try these</p>
  <div class="pills" id="pills"></div>
</section>

<script>
  // ── Sample dataset (replace with your pickle-loaded data via a Flask/FastAPI backend) ──
  const MOVIES = [
    { title: "Avatar", genres: ["Action","Adventure","Sci-Fi"] },
    { title: "The Dark Knight Rises", genres: ["Action","Crime","Drama"] },
    { title: "The Dark Knight", genres: ["Action","Crime","Drama"] },
    { title: "Batman Begins", genres: ["Action","Adventure","Drama"] },
    { title: "Inception", genres: ["Action","Adventure","Sci-Fi"] },
    { title: "Interstellar", genres: ["Adventure","Drama","Sci-Fi"] },
    { title: "Gandhi", genres: ["Biography","Drama","History"] },
    { title: "The Avengers", genres: ["Action","Adventure","Sci-Fi"] },
    { title: "Iron Man", genres: ["Action","Adventure","Sci-Fi"] },
    { title: "Spectre", genres: ["Action","Adventure","Crime"] },
    { title: "Pirates of the Caribbean: At World's End", genres: ["Action","Adventure","Fantasy"] },
    { title: "John Carter", genres: ["Action","Adventure","Sci-Fi"] },
    { title: "Man of Steel", genres: ["Action","Adventure","Fantasy"] },
    { title: "Superman Returns", genres: ["Action","Adventure","Sci-Fi"] },
    { title: "Mulan", genres: ["Animation","Family","Adventure"] },
    { title: "Sherlock Holmes: A Game of Shadows", genres: ["Adventure","Action","Crime"] },
    { title: "Up in the Air", genres: ["Drama","Romance"] },
    { title: "Shallow Hal", genres: ["Comedy","Romance"] },
  ];

  const POPULAR = [
    "Inception", "Interstellar", "The Dark Knight Rises",
    "Avatar", "Gandhi", "Mulan", "Spectre"
  ];

  const MOCK_RECOMMENDATIONS = {
    "The Dark Knight Rises": ["Batman Begins","The Dark Knight","Superman Returns","Man of Steel","Iron Man"],
    "Inception":             ["Interstellar","The Dark Knight","The Matrix","Shutter Island","Memento"],
    "Avatar":                ["John Carter","Interstellar","The Avengers","Iron Man","Spectre"],
    "Gandhi":                ["Gandhi, My Father","A Passage to India","The Wind That Shakes the Barley","Guiana 1838","Ramanujan"],
    "Mulan":                 ["Kung Fu Panda","Brave","Moana","The Lion King","Hercules"],
    "Spectre":               ["Casino Royale","Skyfall","GoldenEye","Mission: Impossible","Jack Ryan: Shadow Recruit"],
    "Interstellar":          ["Inception","Contact","Gravity","The Martian","2001: A Space Odyssey"],
  };

  // ── Suggest dropdown ──
  const input = document.getElementById('movieInput');
  const suggestBox = document.getElementById('suggestions');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    suggestBox.innerHTML = '';
    if (q.length < 2) { suggestBox.classList.remove('open'); return; }
    const matches = MOVIES.filter(m => m.title.toLowerCase().includes(q)).slice(0, 6);
    if (!matches.length) { suggestBox.classList.remove('open'); return; }
    matches.forEach(m => {
      const d = document.createElement('div');
      d.className = 'suggestion-item';
      d.textContent = m.title;
      d.onclick = () => { input.value = m.title; suggestBox.classList.remove('open'); handleSearch(); };
      suggestBox.appendChild(d);
    });
    suggestBox.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap') && !e.target.closest('.suggestions'))
      suggestBox.classList.remove('open');
  });

  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });

  // ── Popular pills ──
  const pillsEl = document.getElementById('pills');
  POPULAR.forEach(title => {
    const p = document.createElement('div');
    p.className = 'pill';
    p.textContent = title;
    p.onclick = () => { input.value = title; handleSearch(); };
    pillsEl.appendChild(p);
  });

  // ── Search handler ──
  function handleSearch() {
    const query = input.value.trim();
    const errorEl = document.getElementById('errorMsg');
    const loadEl  = document.getElementById('loading');
    const resultsEl = document.getElementById('results');

    suggestBox.classList.remove('open');
    errorEl.classList.remove('show');
    resultsEl.classList.remove('show');

    if (!query) return;

    // Show loading
    loadEl.classList.add('show');
    document.getElementById('searchBtn').disabled = true;

    // Simulate async (replace with real fetch() to your Flask backend)
    setTimeout(() => {
      loadEl.classList.remove('show');
      document.getElementById('searchBtn').disabled = false;

      const recs = MOCK_RECOMMENDATIONS[query];
      if (!recs) {
        errorEl.classList.add('show');
        return;
      }

      document.getElementById('queryTitle').textContent = query;
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';

      recs.forEach((title, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-accent"></div>
          <div class="card-rank">0${i+1}</div>
          <div class="card-title">${title}</div>
          <div class="card-sub">Similar pick</div>
        `;
        grid.appendChild(card);
      });

      resultsEl.classList.add('show');
    }, 800);
  }
</script>

</body>
</html>
